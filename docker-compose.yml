version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: lingoai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lingoai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - lingoai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d lingoai"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: lingoai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - lingoai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Faster-Whisper ASR 服务 (Python gRPC)
  asr-service:
    build:
      context: ./asr-service
      dockerfile: Dockerfile
    container_name: lingoai-asr
    ports:
      - "50051:50051"
    volumes:
      - asr_models:/app/models
    environment:
      ASR_PORT: "50051"
      ASR_MODEL: large-v2
      ASR_DEVICE: cpu
      ASR_COMPUTE_TYPE: int8
      ASR_DOWNLOAD_ROOT: /app/models
    networks:
      - lingoai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc; ch=grpc.insecure_channel('localhost:50051'); print(ch)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  asr_models:
    driver: local

networks:
  lingoai-network:
    driver: bridge