server:
  port: 8080

spring:
  application:
    name: lingoai-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/lingoai
    username: admin
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 6000ms

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

logging:
  level:
    com.lingoai: DEBUG
    org.hibernate.SQL: DEBUG

# 发音评测服务配置（示例）
pronunciation:
  api-key: ${PRONUNCIATION_API_KEY:test-key}
  api-url: ${PRONUNCIATION_API_URL:http://localhost:8081}

# ========== AI 服务配置 (from everyone-can-use-english) ==========
ai:
  # LLM 配置
  llm:
    default-engine: openai       # openai | deepseek | glm | qianwen | doubao | ollama
    openai:
      api-key: ${OPENAI_API_KEY:sk-your-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      default-model: gpt-4o
      temperature: 0.8
    # DeepSeek (深度求索) - 国产大模型
    deepseek:
      api-key: ${DEEPSEEK_API_KEY:}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      default-model: deepseek-v4-flash
      temperature: 0.8
    # GLM (智谱) - 国产大模型
    glm:
      api-key: ${GLM_API_KEY:}
      base-url: ${GLM_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
      default-model: glm-5.1
      temperature: 0.8
    # Qianwen (通义千问) - 国产大模型
    qianwen:
      api-key: ${QIANWEN_API_KEY:}
      base-url: ${QIANWEN_BASE_URL:https://dashscope.aliyuncs.com/api/v1/services/aigc/text-generation/generation}
      default-model: qwen-2-plus
      temperature: 0.8
    # Doubao (豆包) - 国产大模型
    doubao:
      api-key: ${DOUBAO_API_KEY:}
      base-url: ${DOUBAO_BASE_URL:https://api.doubao.com/v1}
      default-model: doubao-pro
      temperature: 0.8
    # 支持 OpenAI 兼容接口的其他提供商
    enjoyai:
      api-key: ${ENJOYAI_API_KEY:}
      base-url: ${ENJOYAI_BASE_URL:}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      default-model: llama3

  # TTS 配置 (from enjoy-app TTS_PROVIDERS)
  tts:
    default-engine: piper          # openai | enjoyai | piper | edge-tts
    openai:
      api-key: ${OPENAI_API_KEY:sk-your-key}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
      default-model: tts-1
      default-voice: alloy
    enjoyai:
      api-key: ${ENJOYAI_API_KEY:}
      base-url: ${ENJOYAI_BASE_URL:}
      default-model: openai/tts-1
      default-voice: alloy
    # 本地 TTS (Piper TTS + Edge TTS)
    local:
      base-url: ${TTS_SERVICE_URL:http://localhost:8000}
      default-engine: piper        # piper | edge-tts
      piper-voice: en_US-amy-medium
      piper-speed: 1.0
      edge-voice: en-US-AriaNeural
      edge-rate: "+0%"
      edge-pitch: "+0Hz"
      timeout-ms: 30000
  # Azure 语音 (from enjoy-app azure-speech-sdk.ts)
  azure:
    speech-key: ${AZURE_SPEECH_KEY:}
    speech-region: ${AZURE_SPEECH_REGION:eastasia}

  # ASR 配置
  asr:
    default-engine: faster-whisper # doubao | azure | whisper | faster-whisper
    # 豆包实时语音 (已有集成)
    doubao:
      app-id: ${DOUBAO_APP_ID:}
      access-token: ${DOUBAO_ACCESS_TOKEN:}
      secret-key: ${DOUBAO_SECRET_KEY:}
      ws-url: wss://openspeech.bytedance.com/api/v3/realtime/dialogue
    # Azure 语音识别
    azure:
      speech-key: ${AZURE_SPEECH_KEY:}
      speech-region: ${AZURE_SPEECH_REGION:eastasia}
    # Faster-Whisper 本地 ASR (Python gRPC 微服务)
    faster-whisper:
      host: ${ASR_GRPC_HOST:localhost}
      port: ${ASR_GRPC_PORT:50051}
      model: ${ASR_MODEL:large-v2}
      device: ${ASR_DEVICE:cuda}
      compute-type: ${ASR_COMPUTE_TYPE:int8_float16}
      enable-vad: ${ASR_ENABLE_VAD:true}
      vad-threshold-ms: ${ASR_VAD_THRESHOLD_MS:500}
      window-size-ms: ${ASR_WINDOW_SIZE_MS:500}
      language: ${ASR_LANGUAGE:}
      download-root: ${ASR_DOWNLOAD_ROOT:./models}

  # 音频文件存储路径
  audio-storage-path: ${AI_AUDIO_PATH:./data/audio}
